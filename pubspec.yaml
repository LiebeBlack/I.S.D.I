name: isla_digital
description: Aplicación educativa para niños de 4-6 años de Nueva Esparta, Venezuela
publish_to: 'none'
version: 0.5.7+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ====================== ESTADO ======================
  flutter_riverpod: ^3.2.1

  # ====================== ROUTING (GoRouter 2026) ======================
  go_router: ^17.1.0

  # ====================== UI/UX & Animations ======================
  google_fonts: ^8.0.2
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  flutter_animate: ^4.5.2

  # ====================== AUDIO ======================
  audioplayers: ^6.0.0

  # ====================== ALMACENAMIENTO ======================
  shared_preferences: ^2.3.5
  path_provider: ^2.1.5

  # ====================== FIREBASE & CRASH REPORTING ======================
  firebase_core: ^4.5.0
  firebase_crashlytics: ^5.0.8

  # ====================== MONITORING & LOGGING ======================
  sentry_flutter: ^9.14.0
  logger: ^2.4.0

  # ====================== UTILIDADES ======================
  intl: ^0.20.2
  confetti: ^0.8.0
  vector_math: ^2.1.4
  connectivity_plus: ^7.0.0
  package_info_plus: ^8.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Configuración multiplataforma
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/images/backgrounds/
    - assets/audio/
    - assets/audio/music/
    - assets/animations/
    - assets/animations/characters/
    - assets/animations/ui/
    - assets/animations/success/
    - assets/icons/

  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito-Italic.ttf
          style: italic
        - asset: assets/fonts/Nunito-Light.ttf
          weight: 300
        - asset: assets/fonts/Nunito-LightItalic.ttf
          weight: 300
          style: italic
        - asset: assets/fonts/Nunito-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Nunito-ExtraLightItalic.ttf
          weight: 200
          style: italic
        - asset: assets/fonts/Nunito-Medium.ttf
          weight: 500
        - asset: assets/fonts/Nunito-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-BoldItalic.ttf
          weight: 700
          style: italic
        - asset: assets/fonts/Nunito-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Nunito-ExtraBoldItalic.ttf
          weight: 800
          style: italic
        - asset: assets/fonts/Nunito-Black.ttf
          weight: 900
        - asset: assets/fonts/Nunito-BlackItalic.ttf
          weight: 900
          style: italic

# Configuración de iconos para Android
flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0066CC"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"

# Configuración de pantalla de carga temática
flutter_native_splash:
  color: "#FDF6E3"
  image: assets/icons/splash_logo.png
  branding: assets/icons/splash_branding.png
  branding_mode: bottom
  
  android_12:
    color: "#FDF6E3"
    image: assets/icons/splash_logo.png
    branding: assets/icons/splash_branding.png
  
  android: true
  android_gravity: center
  fullscreen: true
