name: isla_digital
description: Aplicación educativa para niños de 4-6 años de Nueva Esparta, Venezuela
publish_to: 'none'
version: 0.5.7+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # Estado (Riverpod 2.6+ for 2026)
  flutter_riverpod: ^2.6.0
  
  # UI/UX & Animations
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  flutter_animate: ^4.5.1
  
  # Audio
  audioplayers: ^6.0.0
  
  # Almacenamiento local
  shared_preferences: ^2.3.2
  
  # Utilidades
  intl: ^0.20.2
  confetti: ^0.7.0
  vector_math: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  
  # Configuración multiplataforma
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.6

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/images/backgrounds/
    - assets/audio/
    - assets/audio/music/
    - assets/animations/
    - assets/animations/characters/
    - assets/animations/ui/
    - assets/icons/

  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito-Italic.ttf
          style: italic
        - asset: assets/fonts/Nunito-Light.ttf
          weight: 300
        - asset: assets/fonts/Nunito-LightItalic.ttf
          weight: 300
          style: italic
        - asset: assets/fonts/Nunito-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Nunito-ExtraLightItalic.ttf
          weight: 200
          style: italic
        - asset: assets/fonts/Nunito-Medium.ttf
          weight: 500
        - asset: assets/fonts/Nunito-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-BoldItalic.ttf
          weight: 700
          style: italic
        - asset: assets/fonts/Nunito-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Nunito-ExtraBoldItalic.ttf
          weight: 800
          style: italic
        - asset: assets/fonts/Nunito-Black.ttf
          weight: 900
        - asset: assets/fonts/Nunito-BlackItalic.ttf
          weight: 900
          style: italic

# Configuración de iconos para todas las plataformas
flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0066CC"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
  windows:
    generate: true
    image_path: "assets/icons/app_icon.png"
    icon_size: 256
  linux:
    generate: true
    image_path: "assets/icons/app_icon.png"

# Configuración de pantalla de carga temática
flutter_native_splash:
  color: "#FDF6E3"
  image: assets/icons/splash_logo.png
  branding: assets/icons/splash_branding.png
  branding_mode: bottom
  
  android_12:
    color: "#FDF6E3"
    image: assets/icons/splash_logo.png
    branding: assets/icons/splash_branding.png
  
  android: true
  ios: false
  web: false
  
  android_gravity: center
  fullscreen: true
